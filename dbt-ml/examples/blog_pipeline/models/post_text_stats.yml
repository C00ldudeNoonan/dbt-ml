version: 2

models:
  - name: post_text_stats
    description: "Word/sentence counts per blog post via the built-in transform"
    depends_on:
      - ref('raw_posts')

    transform:
      type: python
      module: dbt_ml.text.transforms.text_stats
      options:
        text_field: body
        emit: [word_count, char_count, sentence_count, paragraph_count]

    materialization: full
    tags: [stats, derived]

    tests:
      - not_null: [word_count]
