version: 2

models:
  - name: raw_tickets
    description: "Typed support-ticket table, one row per ticket"
    source: ref('support_tickets')
    extraction:
      backend: json
      options:
        fields:
          - ticket_id
          - product
          - priority
          - status
          - assigned_team
          - summary
          - customer_name
          - customer_email
          - created_at
    materialization: incremental
    tags: [raw, tickets, classic_ml]
    tests:
      - not_null: [ticket_id, summary, priority]
      - unique: ticket_id
