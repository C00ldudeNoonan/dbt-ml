<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}dbt-ml{% endblock %} · dbt-ml docs</title>
  <style>
    :root {
      --bg: #fafafa;
      --fg: #1a1a1a;
      --muted: #666;
      --accent: #2563eb;
      --border: #e5e5e5;
      --code-bg: #f0f0f0;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
           background: var(--bg); color: var(--fg);
           max-width: 960px; margin: 2rem auto; padding: 0 1.5rem; line-height: 1.5; }
    h1, h2, h3 { line-height: 1.2; }
    h1 { border-bottom: 2px solid var(--accent); padding-bottom: 0.3rem; }
    nav { margin-bottom: 1.5rem; font-size: 0.9rem; }
    nav a { color: var(--accent); text-decoration: none; margin-right: 1rem; }
    nav a:hover { text-decoration: underline; }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
    th, td { border: 1px solid var(--border); padding: 0.5rem 0.75rem; text-align: left; vertical-align: top; }
    th { background: var(--code-bg); }
    code { background: var(--code-bg); padding: 0.1rem 0.3rem; border-radius: 3px; font-size: 0.9em; }
    pre code { display: block; padding: 0.75rem; overflow-x: auto; }
    .tag { display: inline-block; background: var(--accent); color: white;
           border-radius: 3px; padding: 0.05rem 0.4rem; font-size: 0.75rem; margin-right: 0.2rem; }
    .muted { color: var(--muted); }
    .card { border: 1px solid var(--border); border-radius: 6px;
            padding: 1rem 1.2rem; margin: 1rem 0; background: white; }
    .kind-extraction { color: #047857; }
    .kind-transform  { color: #6d28d9; }
    .kind-source     { color: #b45309; }
    footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid var(--border);
             color: var(--muted); font-size: 0.85rem; }
  </style>
</head>
<body>
  <nav>
    <a href="index.html">overview</a>
    <a href="lineage.html">lineage</a>
  </nav>
  {% block content %}{% endblock %}
  <footer>
    Generated by <code>dbt-ml docs generate</code> · project
    <code>{{ project.name }}</code> · target <code>{{ project.target }}</code> ·
    {{ generated_at }}
  </footer>
</body>
</html>
