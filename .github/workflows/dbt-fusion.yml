name: dbt-compat

# Validates that docbt's emitted dbt artifacts parse and build under real dbt
# engines: dbt-core (dbt-duckdb) as a hard gate, and the dbt Fusion engine as
# an informational gate while its DuckDB support matures. Flip the Fusion step
# to a required check (drop `continue-on-error`) once it is reliably green.

on:
  push:
    branches: [main, master]
  pull_request:

defaults:
  run:
    working-directory: docbt

jobs:
  dbt-consumer:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: latest

      - name: Set up Python
        run: uv python install 3.12

      - name: Install docbt
        run: uv sync

      - name: Materialize the invoice_pipeline example (+ dbt artifacts)
        run: |
          uv run docbt --project-dir examples/invoice_pipeline seed --count 50
          uv run docbt --project-dir examples/invoice_pipeline run --emit-dbt-artifacts

      - name: Validate emitted dbt manifest.json / run_results.json
        run: |
          uv run python - <<'PY'
          import json
          base = "examples/invoice_pipeline/target/dbt"
          m = json.load(open(f"{base}/manifest.json"))
          assert m["metadata"]["dbt_schema_version"].endswith("manifest/v12.json")
          assert m["sources"] and m["nodes"] == {}
          for uid, node in m["sources"].items():
              assert node["resource_type"] == "source"
              assert node["unique_id"] == uid
              assert node["meta"]["docbt"]["code_version"]
          rr = json.load(open(f"{base}/run_results.json"))
          assert {r["unique_id"] for r in rr["results"]} <= set(m["sources"])
          print(f"ok: {len(m['sources'])} sources, {len(rr['results'])} results")
          PY

      - name: Emit dbt sources (+ packages.yml) into the consumer project
        run: |
          uv run docbt --project-dir examples/invoice_pipeline emit-dbt-sources \
            --emit-packages \
            --output examples/dbt_consumer/models/sources/_docbt_sources.yml

      # ---- Hard gate: dbt-core / dbt-duckdb ----------------------------------
      - name: dbt-core build (dbt-duckdb)
        working-directory: docbt/examples/dbt_consumer
        run: |
          uv sync
          uv run dbt deps --profiles-dir .
          uv run dbt build --profiles-dir .

      # ---- Informational gate: dbt Fusion engine -----------------------------
      # Fusion is strict (it fails parse on undeclared macros rather than
      # warning), so it is the real compatibility signal we are targeting.
      # Kept non-blocking until Fusion's DuckDB adapter support is confirmed.
      - name: Install dbt Fusion
        continue-on-error: true
        run: curl -fsSL https://public.cdn.getdbt.com/fs/install/install.sh | sh -s -- --update

      - name: dbt Fusion parse
        continue-on-error: true
        working-directory: docbt/examples/dbt_consumer
        run: |
          DBTF="$(command -v dbtf || echo "$HOME/.local/bin/dbtf")"
          if [ ! -x "$DBTF" ]; then DBTF="$HOME/.local/bin/dbt"; fi
          "$DBTF" --version
          "$DBTF" deps
          "$DBTF" parse
