name: ci

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: dbt-ml   # the Python project lives in this subdir
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: latest
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync dependencies
        run: uv sync
      - name: Dependency audit
        run: uv run pip-audit --skip-editable
      - name: Ruff
        run: uv run ruff check
      - name: Pytest
        run: uv run pytest -q
