name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: latest
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync dependencies
        run: uv sync
      - name: Ruff
        run: uv run ruff check
      - name: Pytest
        run: uv run pytest -q
