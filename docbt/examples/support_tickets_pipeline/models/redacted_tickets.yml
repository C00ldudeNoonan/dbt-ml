version: 2

models:
  - name: redacted_tickets
    description: "Customer-facing fields with PII redacted via Presidio"
    depends_on:
      - ref('raw_tickets')

    transform:
      type: python
      module: docbt.text.transforms.redact_pii
      options:
        text_field: summary
        output_field: summary_redacted
        entities_field: pii_entities
        entities: [PERSON, EMAIL_ADDRESS, PHONE_NUMBER, URL]
        score_threshold: 0.4

    materialization: full
    tags: [compliance, derived]

    tests:
      - not_null: [ticket_id, summary_redacted]
