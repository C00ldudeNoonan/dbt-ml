version: 2

models:
  - name: invoice_facts
    description: "Per-invoice fact table with derived month + size bucket"
    columns:
      - name: invoice_id
        tests: [not_null, unique]
      - name: vendor
        tests: [not_null]
      - name: issue_month
        tests: [not_null]
      - name: size_bucket
        tests:
          - accepted_values:
              values: [small, medium, large]

  - name: vendor_overview
    description: "Per-vendor counts and totals, cross-checked against docbt's summary"
    columns:
      - name: vendor
        tests: [not_null, unique]
      - name: dbt_row_count
        tests: [not_null]
